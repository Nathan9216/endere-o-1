<!-- index.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Endereço por CEP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Buscador de Endereço por CEP</h1>
        <input type="text" id="cepInput" placeholder="Digite o CEP (ex: 12345-678)">
        <button id="searchButton">Buscar</button>
        <div id="result" class="result">
            <p><strong>CEP:</strong> <span id="cep"></span></p>
            <p><strong>Logradouro:</strong> <span id="logradouro"></span></p>
            <p><strong>Bairro:</strong> <span id="bairro"></span></p>
            <p><strong>Cidade:</strong> <span id="cidade"></span></p>
            <p><strong>Estado:</strong> <span id="estado"></span></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
